const TOTAL = INSERATE.length

async function startImport() {
  const email = document.getElementById("email-input").value.trim();
  const pass  = document.getElementById("pass-input").value;
  if (!email || !pass) { alert("Bitte E-Mail und Passwort eingeben!"); return; }

  document.getElementById("progress-card").style.display = "block";
  document.getElementById("btn-start").disabled = true;
  statDone = 0; statErr = 0;
  log("🔐 Einloggen...\n");

  const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password: pass });
  if (authErr) { log("❌ Login fehlgeschlagen: " + authErr.message + "\n"); document.getElementById("btn-start").disabled = false; return; }

  const user = authData.user;
  log("✅ Eingeloggt als: " + user.email + "\n");

  // Seller profil laden
  const { data: seller } = await sb.from("seller_profiles").select("id,company_name").eq("user_id", user.id).maybeSingle();
  if (!seller) { log("❌ Kein Händlerprofil gefunden!\n"); document.getElementById("btn-start").disabled = false; return; }
  log("🏢 Händler: " + seller.company_name + " (ID: " + seller.id + ")\n\n");

  // Kategorien laden
  const { data: cats } = await sb.from("categories").select("id,name,slug");
  const catMap = {};
  if (cats) cats.forEach(c => { catMap[c.name] = c.id; catMap[c.slug] = c.id; });
  log("📦 " + cats.length + " Kategorien geladen\n\n");

  document.getElementById("stat-total").textContent = INSERATE.length;

  for (let i = 0; i < INSERATE.length; i++) {
    const ins = INSERATE[i];

    // Kategorie-ID finden
    let catId = catMap[ins.category];
    if (!catId) {
      // Fuzzy match: suche ähnlichen Namen
      const match = cats.find(c => c.name.toLowerCase().includes(ins.category.toLowerCase().split(" ")[0]));
      catId = match ? match.id : cats[0].id;
    }

    const payload = {
      seller_id:    seller.id,
      category_id:  catId,
      title:        ins.title,
      manufacturer: ins.manufacturer,
      model:        ins.model,
      condition:    ins.condition || "Gebraucht",
      price:        ins.price,
      year:         ins.year || null,
      location:     ins.location || "Deutschland",
      description:  ins.description,
      status:       "Freigegeben",
      listing_type: ins.listing_type || "Verkauf",
      price_type:   ins.price_type || "Festpreis",
      image_urls:   []
    };

    const { data, error } = await sb.from("listings").insert([payload]).select("id");

    if (error) {
      statErr++;
      log("❌ [" + (i+1) + "/" + INSERATE.length + "] FEHLER: " + ins.title.substring(0,40) + "... → " + error.message + "\n");
    } else {
      statDone++;
      importedIds.push(data[0].id);
      log("✅ [" + (i+1) + "/" + INSERATE.length + "] " + ins.title.substring(0,55) + "...\n");
    }

    document.getElementById("stat-done").textContent = statDone;
    document.getElementById("stat-err").textContent  = statErr;
    document.getElementById("progress-bar").style.width = ((i+1)/INSERATE.length*100).toFixed(0) + "%";

    // kurze Pause zwischen Inserts
    await new Promise(r => setTimeout(r, 80));
  }

  log("\n🎉 FERTIG! " + statDone + " Inserate erfolgreich eingefügt, " + statErr + " Fehler.\n");
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-delete").style.display = "block";
}

async function deleteAll() {
  if (!importedIds.length) { alert("Keine importierten IDs gespeichert. Nur in dieser Session löschbar."); return; }
  if (!confirm("Alle " + importedIds.length + " importierten Inserate löschen?")) return;

  log("\n🗑️ Lösche " + importedIds.length + " Inserate...\n");
  const { error } = await sb.from("listings").delete().in("id", importedIds);
  if (error) { log("❌ Fehler: " + error.message + "\n"); return; }
  log("✅ Alle importierten Inserate gelöscht.\n");
  importedIds = [];
}

function log(msg) {
  const el = document.getElementById("log");
  el.textContent += msg;
  el.scrollTop = el.scrollHeight;
}
</script>
