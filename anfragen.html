<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="favicon-192x192.png" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Anfragen – 1A Motor</title>
<style>
  :root{ --bg:#edf0f4; --card:#fff; --text:#1f2937; --muted:#6b7280; --border:#dbe3ea; --dark-blue:#1a3a52; --blue:#2b6cb0; --light-blue:#72b6ff; --success:#059669; --warning:#d97706; --danger:#dc2626; --shadow:0 4px 20px rgba(18,58,99,0.08); --radius:14px; }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:Arial,Helvetica,sans-serif; }
  body{ background:var(--bg); color:var(--text); line-height:1.5; }
  a{ text-decoration:none; color:inherit; }
  .container{ max-width:1400px; margin:0 auto; padding:0 20px; }
  .header{ background:#fff; border-bottom:2px solid var(--border); position:sticky; top:0; z-index:50; box-shadow:0 2px 12px rgba(18,58,99,0.06); }
  .header-inner{ display:flex; justify-content:space-between; align-items:center; gap:18px; padding:14px 0; }
  .logo{ display:flex; align-items:center; gap:10px; font-size:24px; font-weight:800; color:var(--dark-blue); }
  
  .header-actions{ display:flex; align-items:center; gap:12px; font-size:14px; }
  .page{ padding:24px 0 48px; }
  .layout{ display:grid; grid-template-columns:240px 1fr; gap:22px; align-items:start; }
  .sidebar{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; position:sticky; top:80px; }
  .sidebar-profile{ padding:22px 18px 18px; background:linear-gradient(135deg,#1e3a52,#2a5278); position:relative; overflow:hidden; }
  .sidebar-profile::after{ content:"⚙️"; position:absolute; right:-10px; bottom:-14px; font-size:72px; opacity:.1; pointer-events:none; }
  .profile-avatar{ width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); display:grid; place-items:center; font-size:20px; font-weight:800; color:#fff; margin-bottom:12px; }
  .profile-name{ font-size:16px; font-weight:700; color:#fff; margin-bottom:3px; }
  .profile-email{ font-size:12px; color:rgba(255,255,255,0.65); }
  .profile-badge{ display:inline-block; margin-top:10px; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.85); font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; }
  .sidebar-nav{ padding:12px 10px; }
  .nav-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:#334155; font-size:14px; font-weight:600; transition:background .12s; margin-bottom:2px; }
  .nav-item:hover{ background:#f0f4f8; color:var(--dark-blue); }
  .nav-item.active{ background:#e8f0f8; color:var(--dark-blue); font-weight:700; }
  .nav-item .nav-icon{ font-size:16px; width:22px; text-align:center; flex-shrink:0; }
  .nav-divider{ height:1px; background:var(--border); margin:10px 12px; }
  .nav-item.logout{ color:var(--danger); }
  .content{ display:flex; flex-direction:column; gap:20px; }
  .page-head{ display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
  .page-head h1{ font-size:26px; color:var(--dark-blue); font-weight:800; }
  .page-head p{ color:var(--muted); font-size:14px; margin-top:3px; }

  /* Filter Tabs */
  .tab-bar{ display:flex; gap:4px; background:#f1f5f9; border-radius:10px; padding:4px; }
  .tab{ padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .15s; border:none; background:none; }
  .tab.active{ background:#fff; color:var(--dark-blue); box-shadow:0 2px 8px rgba(18,58,99,0.1); }
  .tab-count{ display:inline-flex; align-items:center; justify-content:center; width:18px; height:18px; border-radius:999px; font-size:10px; font-weight:700; background:#e8f0f8; color:var(--dark-blue); margin-left:5px; }
  .tab.active .tab-count{ background:var(--dark-blue); color:#fff; }

  /* Inquiry Card */
  .inquiry-card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; transition:box-shadow .2s; }
  .inquiry-card:hover{ box-shadow:0 6px 20px rgba(18,58,99,0.09); }
  .inq-header{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:16px 18px; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; }
  .inq-title{ font-size:15px; font-weight:700; color:var(--dark-blue); margin-bottom:4px; }
  .inq-meta{ display:flex; flex-wrap:wrap; gap:12px; font-size:13px; color:var(--muted); }
  .inq-meta strong{ color:#334155; }
  .status-badge{ display:inline-flex; align-items:center; padding:4px 12px; border-radius:999px; font-size:11px; font-weight:700; }
  .status-badge.neu{ background:#eff6ff; color:#2563eb; border:1px solid #bfdbfe; }
  .status-badge.gelesen{ background:#f0fdf4; color:#059669; border:1px solid #a7f3d0; }
  .status-badge.erledigt{ background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; }

  /* Chat Area */
  .chat-area{ padding:16px 18px; }
  .chat-messages{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; max-height:320px; overflow-y:auto; }
  .msg{ max-width:75%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.55; }
  .msg.buyer{ background:#f1f5f9; color:#1e293b; align-self:flex-start; border:1px solid #e2e8f0; border-radius:12px 12px 12px 4px; }
  .msg.seller{ background:linear-gradient(135deg,#1e3a52,#2a5278); color:#fff; align-self:flex-end; border-radius:12px 12px 4px 12px; }
  .msg-meta{ font-size:11px; opacity:.7; margin-bottom:4px; }
  .msg-text{ white-space:pre-wrap; }

  /* Reply Box */
  .reply-box{ display:flex; gap:10px; align-items:flex-end; }
  .reply-input{ flex:1; min-height:72px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; font-size:14px; resize:vertical; outline:none; transition:border-color .15s; }
  .reply-input:focus{ border-color:var(--blue); box-shadow:0 0 0 3px rgba(43,108,176,0.1); }
  .reply-send{ background:var(--dark-blue); color:#fff; border:none; border-radius:10px; padding:10px 16px; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; transition:background .15s; }
  .reply-send:hover{ background:var(--blue); }

  /* Status Buttons */
  .status-btns{ display:flex; gap:6px; padding:12px 18px; border-top:1px solid #f1f5f9; background:#fafbfc; flex-wrap:wrap; }
  .status-btn{ padding:6px 12px; border-radius:7px; border:1px solid var(--border); background:#fff; font-size:12px; font-weight:700; cursor:pointer; transition:all .12s; color:#334155; }
  .status-btn:hover{ background:#f0f4f8; }
  .status-btn.active-status{ background:var(--dark-blue); color:#fff; border-color:var(--dark-blue); }

  .empty-box{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:40px; text-align:center; }
  .empty-box .empty-icon{ font-size:44px; margin-bottom:12px; }
  .empty-box h3{ color:var(--dark-blue); margin-bottom:8px; font-size:18px; }
  .empty-box p{ color:var(--muted); font-size:14px; }

  @media(max-width:980px){ .layout{ grid-template-columns:1fr; } .sidebar{ position:static; } }

  /* ═══════════════════════════════════════
     MOBILE RESPONSIVE
  ═══════════════════════════════════════ */
  @media (max-width: 768px) {
    .container { padding: 0 14px; }
    .header-inner { flex-wrap: wrap; gap: 10px; padding: 10px 0; }
    .logo { font-size: 18px; }
    .logo-badge, .logo-mark { width: 34px; height: 34px; font-size: 14px; }
    .header-actions { display: none; }
    .layout { grid-template-columns: 1fr !important; }
    .sidebar { position: static !important; top: auto !important; }
    .page-head h1 { font-size: 22px !important; }
    .page-head p { font-size: 13px; }
    .stats-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
    .stat-value { font-size: 22px !important; }
    .panel { padding: 14px !important; }
    .table-wrap { overflow-x: auto; }
    .table { min-width: 600px; }
    .bottom-grid { grid-template-columns: 1fr !important; }
    .listing-grid { grid-template-columns: 1fr !important; }
    .listing-card { grid-template-columns: 1fr !important; }
    .card-image { min-height: 180px !important; }
    .filter-bar { flex-direction: column; }
    .filter-bar input, .filter-bar select { width: 100%; }
    .grid-2, .grid-3 { grid-template-columns: 1fr !important; }
    .plan-grid { grid-template-columns: 1fr !important; }
    .info-grid, .bottom-grid { grid-template-columns: 1fr !important; }
    .plan-card.featured { transform: none; }
    .nav-item { padding: 9px 10px; font-size: 13px; }
    .profile-name { font-size: 14px; }
    .tab-bar { flex-wrap: wrap; }
    .tab { font-size: 12px; padding: 6px 10px; }
    .msg { max-width: 90% !important; }
    .reply-box { flex-direction: column; }
    .reply-input { width: 100%; }
    .chat-messages { max-height: 250px; }
    .page { padding: 16px 0 32px !important; }
  }

  @media (max-width: 480px) {
    .logo-name { font-size: 18px; }
    .stats-grid { grid-template-columns: 1fr 1fr !important; }
    .page-head { flex-direction: column; align-items: flex-start !important; }
    .page-head .new-btn, .page-head a { width: 100%; text-align: center; }
    .action-links { flex-wrap: wrap; }
    .inq-header { flex-direction: column; }
    .inq-meta { flex-direction: column; gap: 4px; }
    .sidebar-profile { padding: 16px 14px; }
  }


  /* ── Einheitliches Logo ── */
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
  .logo-mark {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(145deg, #1b2d42, #2a4a6b);
    display: grid; place-items: center;
    font-weight: 900; font-size: 15px; color: #fff;
    box-shadow: 0 4px 12px rgba(13,27,42,0.35);
    flex-shrink: 0; letter-spacing: -0.5px;
    font-family: 'Outfit', Arial, sans-serif;
  }
  .logo-name {
    font-size: 22px; font-weight: 800;
    color: #0d1b2a; letter-spacing: -.3px;
    font-family: 'Outfit', Arial, sans-serif;
  }

</style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <div class="logo-mark">1A</div>
      <div class="logo-name">Motor</div>
    </a>
    <div class="header-actions"></div>
  </div>
</header>

<main class="page">
  <div class="container layout">

    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="profile-avatar" id="sidebar-avatar">?</div>
        <div class="profile-name user-box h2">Wird geladen...</div>
        <div class="profile-email user-box p">–</div>
        <span class="profile-badge">Händlerkonto</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="anzeige-erstellen.html" class="nav-item"><span class="nav-icon">➕</span>Anzeige erstellen</a>
        <a href="meine-anzeigen.html" class="nav-item"><span class="nav-icon">📋</span>Meine Anzeigen</a>
        <a href="anfragen.html" class="nav-item active"><span class="nav-icon">💬</span>Anfragen</a>
        <a href="profil.html" class="nav-item"><span class="nav-icon">⚙️</span>Profil</a>
        <a href="pakete.html" class="nav-item"><span class="nav-icon">🏆</span>Pakete</a>
        <div class="nav-divider"></div>
        <a href="suche.html" class="nav-item"><span class="nav-icon">🔍</span>Zur Suche</a>
        <a href="#" class="nav-item logout" id="sidebar-logout"><span class="nav-icon">🚪</span>Abmelden</a>
      </nav>
    </aside>

    <section class="content">
      <div class="page-head">
        <div>
          <h1>Anfragen</h1>
          <p>Nachrichten von Käufern zu deinen Inseraten.</p>
        </div>
        <div class="tab-bar" id="tab-bar">
          <button class="tab active" data-filter="">Alle <span class="tab-count" id="count-all">0</span></button>
          <button class="tab" data-filter="Neu">Neu <span class="tab-count" id="count-neu">0</span></button>
          <button class="tab" data-filter="Gelesen">Gelesen <span class="tab-count" id="count-gelesen">0</span></button>
          <button class="tab" data-filter="Erledigt">Erledigt <span class="tab-count" id="count-erledigt">0</span></button>
        </div>
      </div>

      <div id="inquiry-list">
        <div class="empty-box">
          <div class="empty-icon">⏳</div>
          <h3>Anfragen werden geladen...</h3>
        </div>
      </div>
    </section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="anfragen-live.js"></script>
<script src="auth-header.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("sidebar-logout")?.addEventListener("click", async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    window.location.href = "index.html";
  });
});
</script>

</body>
</html>
