<style>
  :root{
    --bg:#edf0f4; --card:#fff; --text:#1f2937; --muted:#6b7280;
    --border:#dbe3ea; --dark-blue:#1a3a52; --blue:#2b6cb0;
    --shadow:0 4px 20px rgba(18,58,99,0.08); --radius:14px;
  }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:'Outfit',Arial,sans-serif; }
  body{ background:var(--bg); color:var(--text); line-height:1.7; }
  a{ text-decoration:none; color:var(--blue); }
  a:hover{ text-decoration:underline; }
  .container{ max-width:860px; margin:0 auto; padding:0 20px; }

  .header{
    background:#fff; border-bottom:2px solid var(--border);
    position:sticky; top:0; z-index:50;
    box-shadow:0 2px 12px rgba(18,58,99,0.06);
  }
  .header-inner{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 0; gap:16px;
  }
  .logo{ display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-mark{
    width:40px; height:40px; border-radius:10px;
    background:linear-gradient(145deg,#1b2d42,#2a4a6b);
    display:grid; place-items:center;
    font-weight:900; font-size:15px; color:#fff;
    box-shadow:0 4px 12px rgba(13,27,42,0.35);
  }
  .logo-name{ font-size:22px; font-weight:800; color:#0d1b2a; letter-spacing:-.3px; }
  .back-link{ font-size:14px; color:var(--blue); font-weight:600; }

  .page{ padding:40px 0 60px; }
  .breadcrumb{
    font-size:13px; color:var(--muted); margin-bottom:24px;
    display:flex; gap:8px; align-items:center;
  }
  .breadcrumb a{ color:var(--muted); }

  /* TOC */
  .toc{
    background:#f0f6ff; border:1px solid #c3daf5;
    border-radius:12px; padding:20px 24px; margin-bottom:24px;
  }
  .toc h3{ font-size:14px; font-weight:700; color:var(--dark-blue); margin-bottom:12px; }
  .toc ol{ padding-left:18px; }
  .toc li{ font-size:13px; color:var(--blue); margin-bottom:5px; }
  .toc li a{ color:var(--blue); }
  .toc li a:hover{ text-decoration:underline; }

  .card{
    background:var(--card); border:1px solid var(--border);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:36px 40px; margin-bottom:18px;
  }
  .card h1{ font-size:28px; color:var(--dark-blue); margin-bottom:6px; font-weight:800; }
  .card .subtitle{
    color:var(--muted); font-size:14px; margin-bottom:28px;
    padding-bottom:20px; border-bottom:1px solid var(--border);
  }

  .section{ margin-bottom:32px; padding-bottom:32px; border-bottom:1px solid var(--border); }
  .section:last-child{ border-bottom:none; margin-bottom:0; padding-bottom:0; }

  h2{
    font-size:17px; color:var(--dark-blue); font-weight:700;
    margin-bottom:14px; display:flex; align-items:center; gap:10px;
  }
  .section-num{
    display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; border-radius:8px;
    background:var(--dark-blue); color:#fff;
    font-size:13px; font-weight:800; flex-shrink:0;
  }
  h3{ font-size:15px; color:#1e293b; font-weight:700; margin:16px 0 8px; }
  p{ font-size:14px; color:#374151; margin-bottom:10px; line-height:1.75; }
  ul, ol{ padding-left:20px; margin-bottom:12px; }
  ul li, ol li{ font-size:14px; color:#374151; margin-bottom:6px; line-height:1.7; }
  ul li::marker{ color:var(--dark-blue); }

  .info-block{
    background:#f8fafc; border:1px solid var(--border);
    border-radius:10px; padding:16px 18px; margin:12px 0;
  }
  .info-block p{ margin:0; line-height:1.8; }
  .info-block strong{ color:var(--dark-blue); }

  .warning-box{
    background:#fff8f0; border:1px solid #fbbf24;
    border-radius:10px; padding:14px 18px; margin:14px 0;
  }
  .warning-box p{ margin:0; font-size:13px; color:#92400e; }

  .notice-box{
    background:#fffbeb; border:1px solid #fcd34d;
    border-radius:10px; padding:14px 18px; margin-top:24px;
  }
  .notice-box p{ margin:0; font-size:13px; color:#92400e; line-height:1.7; }

  .highlight-box{
    background:#f0fdf4; border:1px solid #86efac;
    border-radius:10px; padding:14px 18px; margin:12px 0;
  }
  .highlight-box p{ margin:0; font-size:13px; color:#14532d; }

  footer{
    margin-top:40px; padding:20px 0;
    border-top:1px solid var(--border);
    text-align:center; font-size:12px; color:var(--muted);
  }
  footer a{ color:var(--muted); margin:0 8px; }
  footer a:hover{ color:var(--dark-blue); text-decoration:none; }

  @media(max-width:640px){
    .card{ padding:24px 20px; }
    .card h1{ font-size:22px; }
  }
</style>
