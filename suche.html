  /* ── Header ── */

  /* Header Searchbox */

  .header-actions{ display:flex; align-items:center; gap:10px; font-size:13px; white-space:nowrap; }
  .header-actions a{ color:#334155; font-weight:600; }
  .sell-btn{ background:var(--dark-blue); color:#fff !important; padding:9px 16px; border-radius:999px; font-weight:700; font-size:13px; }

  .category-hero-overlay{ width:100%; height:100%; background:linear-gradient(90deg,rgba(7,18,35,.78) 0%,rgba(7,18,35,.35) 50%,transparent 100%); display:flex; align-items:center; }
  .category-hero-text{ color:#fff; max-width:600px; }
  .category-hero-kicker{ display:block; font-size:13px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; opacity:.85; margin-bottom:10px; }
  .category-hero-text h2{ font-size:48px; line-height:1.05; font-weight:800; margin-bottom:4px; }
  @media(max-width:760px){ .category-hero{ height:200px; } .category-hero-text h2{ font-size:32px; } }

  /* ── Page ── */
  .page{ padding:20px 0 48px; }
  .search-layout{ display:grid; grid-template-columns:260px 1fr; gap:20px; align-items:start; }

  /* ── Sidebar ── */
  .sidebar{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; position:sticky; top:80px; }
  .filter-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .filter-head h2{ font-size:15px; font-weight:700; color:var(--dark-blue); }
  .filter-reset{ font-size:12px; color:var(--blue); font-weight:600; cursor:pointer; border:none; background:none; }
  .filter-section{ margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--border); }
  .filter-section:last-child{ margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .filter-section h3{ font-size:13px; font-weight:700; color:#334155; margin-bottom:10px; }
  .filter-options{ display:flex; flex-direction:column; gap:7px; }
  .filter-option{ display:flex; align-items:center; gap:8px; font-size:13px; color:#475569; cursor:pointer; padding:5px 8px; border-radius:8px; transition:background .12s; }
  .filter-option:hover{ background:#f0f4f8; }
  .filter-option input{ width:auto; margin:0; cursor:pointer; }
  .price-inputs{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .price-inputs input{ padding:9px 10px; border:1px solid var(--border); border-radius:9px; font-size:13px; outline:none; width:100%; }
  .price-inputs input:focus{ border-color:var(--blue); }
  .apply-price{ width:100%; margin-top:8px; padding:9px; background:var(--dark-blue); color:#fff; border:none; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; transition:background .15s; }
  .apply-price:hover{ background:var(--blue); }

  /* ── Results Area ── */

<script>
// ── View Toggle ───────────────────────────────────────────────────────────────
const gridBtn = document.getElementById("grid-view-btn");
const listBtn = document.getElementById("list-view-btn");
const grid    = document.getElementById("search-results");

gridBtn?.addEventListener("click", () => {
  grid?.classList.remove("list-view");
  gridBtn.classList.add("active");
  listBtn.classList.remove("active");
  localStorage.setItem("search_view", "grid");
});
listBtn?.addEventListener("click", () => {
  grid?.classList.add("list-view");
  listBtn.classList.add("active");
  gridBtn.classList.remove("active");
  localStorage.setItem("search_view", "list");
});

// Gespeicherte Ansicht wiederherstellen
if (localStorage.getItem("search_view") === "list") {
  grid?.classList.add("list-view");
  listBtn?.classList.add("active");
  gridBtn?.classList.remove("active");
}

// ── Filter Reset ──────────────────────────────────────────────────────────────
document.getElementById("filter-reset")?.addEventListener("click", () => {
  document.querySelectorAll("input[name='zustand']").forEach(cb => cb.checked = false);
  document.querySelectorAll("#sidebar-category-list input[type='checkbox']").forEach(cb => cb.checked = false);
  document.getElementById("price-min").value = "";
  document.getElementById("price-max").value = "";
  window.location.href = "suche.html";
});
</script>
