  /* ── Header ── */

  /* Header Searchbox */

  .header-search:focus-within{ box-shadow:0 0 0 3px rgba(26,58,82,0.12); }
  .header-search input{ flex:1; border:none; outline:none; padding:11px 16px; font-size:14px; }
  .header-search select{ border:none; border-left:1px solid var(--border); outline:none; padding:11px 12px; font-size:13px; background:#f8fbff; color:var(--muted); min-width:150px; }
  .header-search button{ background:var(--dark-blue); color:#fff; border:none; padding:11px 20px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap; transition:background .15s; }
  .header-search button:hover{ background:var(--blue); }
  .header-actions{ display:flex; align-items:center; gap:10px; font-size:13px; white-space:nowrap; }
  .header-actions a{ color:#334155; font-weight:600; }
  .sell-btn{ background:var(--dark-blue); color:#fff !important; padding:9px 16px; border-radius:999px; font-weight:700; font-size:13px; }

  .category-hero-overlay{ width:100%; height:100%; background:linear-gradient(90deg,rgba(7,18,35,0.65) 0%,rgba(7,18,35,0.20) 45%,transparent 70%); display:flex; align-items:center; }
  .category-hero-text{ color:#fff; max-width:600px; }
  .category-hero-kicker{ display:block; font-size:13px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; opacity:.9; margin-bottom:10px; }
  .category-hero-text h2{ font-size:48px; line-height:1.05; font-weight:800; margin-bottom:8px; }
  @media(max-width:760px){ .category-hero{ height:260px; } .category-hero-text h2{ font-size:30px; } }

  /* ── Page ── */
  .page{ padding:20px 0 48px; }
  .search-layout{ display:grid; grid-template-columns:260px 1fr; gap:20px; align-items:start; }

  /* ── Sidebar ── */
  .sidebar{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px; position:sticky; top:80px; }
  .filter-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .filter-head h2{ font-size:15px; font-weight:700; color:var(--dark-blue); }
  .filter-reset{ font-size:12px; color:var(--blue); font-weight:600; cursor:pointer; border:none; background:none; }
  .filter-section{ margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid var(--border); }
  .filter-section:last-child{ margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .filter-section h3{ font-size:13px; font-weight:700; color:#334155; margin-bottom:10px; }
  .filter-options{ display:flex; flex-direction:column; gap:7px; }
  .filter-option{ display:flex; align-items:center; gap:8px; font-size:13px; color:#475569; cursor:pointer; padding:5px 8px; border-radius:8px; transition:background .12s; }
  .filter-option:hover{ background:#f0f4f8; }
  .filter-option input{ width:auto; margin:0; cursor:pointer; }
  .price-inputs{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .price-inputs input{ padding:9px 10px; border:1px solid var(--border); border-radius:9px; font-size:13px; outline:none; width:100%; }
  .price-inputs input:focus{ border-color:var(--blue); }
  .apply-price{ width:100%; margin-top:8px; padding:9px; background:var(--dark-blue); color:#fff; border:none; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; transition:background .15s; }
  .apply-price:hover{ background:var(--blue); }

  /* ── Results Area ── */
  .results-area{ display:flex; flex-direction:column; gap:16px; }
  .results-toolbar{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  .results-info{ font-size:14px; color:var(--muted); }
  .results-info strong{ color:var(--dark-blue); }
  .sort-select{ padding:9px 12px; border:1px solid var(--border); border-radius:9px; font-size:13px; outline:none; cursor:pointer; }
  .view-toggle{ display:flex; gap:4px; }
  .view-btn{ width:34px; height:34px; border:1px solid var(--border); border-radius:8px; background:#fff; display:grid; place-items:center; cursor:pointer; font-size:14px; transition:all .12s; }
  .view-btn.active{ background:var(--dark-blue); color:#fff; border-color:var(--dark-blue); }

  /* ── Listing Grid ── */
  .listing-grid{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:16px; }
  .listing-grid.list-view{ grid-template-columns:1fr; }

  .listing-card{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; display:block; transition:transform .2s, box-shadow .2s, border-color .2s; }
  .listing-card:hover{ transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:#c5d9f0; }

  /* Grid Card */
  .card-image{ height:200px; background:linear-gradient(135deg,#dfe7ef,#f2f7fb); display:flex; align-items:center; justify-content:center; font-size:48px; color:var(--dark-blue); position:relative; background-size:cover; background-position:center; }
  .img-badge{ position:absolute; top:10px; left:10px; background:#fff; border:1px solid var(--border); padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; color:var(--dark-blue); }
  .img-fav{ position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.95); border:1px solid var(--border); display:grid; place-items:center; font-size:14px; cursor:pointer; }
  .card-body{ padding:14px; }
  .card-title{ font-size:15px; font-weight:700; color:#1e293b; margin-bottom:6px; line-height:1.35; min-height:40px; }
  .card-meta{ display:flex; flex-wrap:wrap; gap:7px; font-size:12px; color:var(--muted); margin-bottom:9px; }
  .card-price{ font-size:22px; font-weight:800; color:var(--dark-blue); margin-bottom:4px; }
  .card-condition{ font-size:12px; color:var(--success); font-weight:600; margin-bottom:10px; }
  .card-footer{ display:flex; justify-content:space-between; align-items:center; padding-top:10px; border-top:1px solid #f1f5f9; font-size:12px; color:var(--muted); }
  .card-seller{ display:flex; align-items:center; gap:5px; font-weight:600; color:#334155; }
  .seller-dot{ width:7px; height:7px; border-radius:50%; background:var(--success); }

  /* List View Card */
  .listing-grid.list-view .listing-card{ display:grid; grid-template-columns:200px 1fr; }
  .listing-grid.list-view .card-image{ height:auto; min-height:140px; }
  .listing-grid.list-view .card-title{ min-height:auto; font-size:16px; }
  .listing-grid.list-view .card-price{ font-size:24px; }

  /* ── Empty ── */
  .empty-box{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:48px 20px; text-align:center; }
  .empty-icon{ font-size:48px; margin-bottom:12px; }
  .empty-box h3{ font-size:18px; color:var(--dark-blue); margin-bottom:8px; }
  .empty-box p{ color:var(--muted); font-size:14px; }

  /* ── Active Filters ── */
  .active-filters{ display:flex; flex-wrap:wrap; gap:7px; }
  .filter-tag{ display:inline-flex; align-items:center; gap:6px; background:#e8f0f8; color:var(--dark-blue); font-size:12px; font-weight:600; padding:5px 10px; border-radius:999px; }
  .filter-tag button{ background:none; border:none; cursor:pointer; color:var(--dark-blue); font-size:14px; line-height:1; padding:0; }

  /* ── Responsive ── */
  @media(max-width:1200px){ .listing-grid{ grid-template-columns:repeat(2,1fr); } }

<script>
// ── View Toggle ───────────────────────────────────────────────────────────────
const gridBtn = document.getElementById("grid-view-btn");
const listBtn = document.getElementById("list-view-btn");
const grid    = document.getElementById("search-results");

gridBtn?.addEventListener("click", () => {
  grid?.classList.remove("list-view");
  gridBtn.classList.add("active");
  listBtn.classList.remove("active");
  localStorage.setItem("search_view", "grid");
});
listBtn?.addEventListener("click", () => {
  grid?.classList.add("list-view");
  listBtn.classList.add("active");
  gridBtn.classList.remove("active");
  localStorage.setItem("search_view", "list");
});

// Gespeicherte Ansicht wiederherstellen
if (localStorage.getItem("search_view") === "list") {
  grid?.classList.add("list-view");
  listBtn?.classList.add("active");
  gridBtn?.classList.remove("active");
}

// ── Filter Reset ──────────────────────────────────────────────────────────────
document.getElementById("filter-reset")?.addEventListener("click", () => {
  document.querySelectorAll("input[name='zustand']").forEach(cb => cb.checked = false);
  document.querySelectorAll("#sidebar-category-list input[type='checkbox']").forEach(cb => cb.checked = false);
  document.getElementById("price-min").value = "";
  document.getElementById("price-max").value = "";
  window.location.href = "suche.html";
});
</script>
