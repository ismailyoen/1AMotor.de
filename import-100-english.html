let importedIds = [];
let statDone = 0, statErr = 0;

async function startImport() {
  const email = document.getElementById("email-input").value.trim();
  const pass  = document.getElementById("pass-input").value;
  if (!email || !pass) { alert("Please enter email and password!"); return; }

  document.getElementById("progress-card").style.display = "block";
  document.getElementById("btn-start").disabled = true;
  statDone = 0; statErr = 0; importedIds = [];
  log("🔐 Logging in...\n");

  const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password: pass });
  if (authErr) { log("❌ Login failed: " + authErr.message + "\n"); document.getElementById("btn-start").disabled = false; return; }

  const user = authData.user;
  log("✅ Logged in as: " + user.email + "\n");

  const { data: seller } = await sb.from("seller_profiles").select("id,company_name").eq("user_id", user.id).maybeSingle();
  if (!seller) { log("❌ No seller profile found!\n"); document.getElementById("btn-start").disabled = false; return; }
  log("🏢 Dealer: " + seller.company_name + "\n");

  const { data: cats } = await sb.from("categories").select("id,name,slug");
  const catMap = {};
  if (cats) cats.forEach(c => {
    catMap[c.name] = c.id;
    catMap[c.name.toLowerCase()] = c.id;
    catMap[c.slug] = c.id;
  });
  log("📦 " + cats.length + " categories loaded\n\n");

  document.getElementById("stat-total").textContent = INSERATE.length;

  const BATCH = 10;
  for (let i = 0; i < INSERATE.length; i += BATCH) {
    const batch = INSERATE.slice(i, i + BATCH);
    const payloads = [];

    for (const ins of batch) {
      let catId = catMap[ins.category] || catMap[ins.category.toLowerCase()];
      if (!catId) {
        const firstWord = ins.category.split(" ")[0].toLowerCase();
        const match = cats.find(c => c.name.toLowerCase().includes(firstWord) || c.slug.includes(firstWord));
        catId = match ? match.id : cats[0].id;
      }
      payloads.push({
        seller_id:    seller.id,
        category_id:  catId,
        title:        ins.title,
        manufacturer: ins.manufacturer,
        model:        ins.model,
        condition:    ins.condition || "Used",
        price:        ins.price,
        year:         ins.year || null,
        location:     ins.location || "Europe",
        description:  ins.description,
        status:       "Freigegeben",
        listing_type: ins.listing_type === "Wanted" ? "Gesuch" : "Verkauf",
        price_type:   ins.price_type === "Negotiable" ? "Verhandlungsbasis" : "Festpreis",
        image_urls:   []
      });
    }

    const { data, error } = await sb.from("listings").insert(payloads).select("id");

    if (error) {
      statErr += batch.length;
      log("❌ Batch [" + (i+1) + "-" + Math.min(i+BATCH, INSERATE.length) + "] ERROR: " + error.message + "\n");
    } else {
      statDone += data.length;
      data.forEach(d => importedIds.push(d.id));
      log("✅ [" + (i+1) + "-" + Math.min(i+BATCH, INSERATE.length) + "/" + INSERATE.length + "] " + batch[0].title.substring(0,55) + "...\n");
    }

    const pct = Math.round(Math.min(i + BATCH, INSERATE.length) / INSERATE.length * 100);
    document.getElementById("stat-done").textContent = statDone;
    document.getElementById("stat-err").textContent  = statErr;
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("progress-pct").textContent = pct + "%";
    await new Promise(r => setTimeout(r, 50));
  }

  log("\n🎉 DONE! " + statDone + " listings inserted, " + statErr + " errors.\n");
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-delete").style.display = "block";
}

async function deleteAll() {
  if (!importedIds.length) { alert("No IDs from this session stored."); return; }
  if (!confirm("Delete all " + importedIds.length + " imported listings?")) return;
  log("\n🗑️ Deleting " + importedIds.length + " listings...\n");
  for (let i = 0; i < importedIds.length; i += 100) {
    await sb.from("listings").delete().in("id", importedIds.slice(i, i + 100));
  }
  log("✅ All deleted!\n");
  importedIds = [];
}

function log(msg) {
  const el = document.getElementById("log");
  el.textContent += msg;
  el.scrollTop = el.scrollHeight;
}
</script>
