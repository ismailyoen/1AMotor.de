<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nachrichten – 1A Motor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#f4f7fb; --card:#ffffff; --text:#1f2937; --muted:#7a93ae;
  --border:#e0e9f2; --dark:#0d1b2a; --navy:#1b2d42;
  --blue:#1a5fa8; --blue2:#2176c7; --sky:#4da6ff;
  --success:#10b981; --shadow:0 2px 16px rgba(13,27,42,0.08); --r:14px;
}
* { box-sizing:border-box; margin:0; padding:0; font-family:'Outfit',Arial,sans-serif; }
body { background:var(--bg); color:var(--text); line-height:1.5; }
a { text-decoration:none; color:inherit; }
.container { max-width:1360px; margin:0 auto; padding:0 24px; }

/* ── Header ── */
.header { background:#fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:0 1px 0 var(--border),0 4px 16px rgba(13,27,42,0.06); }
.header-inner { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:12px 0; }
.logo { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.logo-mark { width:40px; height:40px; border-radius:10px; background:linear-gradient(145deg,var(--blue),var(--sky)); display:grid; place-items:center; font-weight:900; font-size:16px; color:#fff; box-shadow:0 4px 12px rgba(26,95,168,0.3); }
.logo-name { font-size:20px; font-weight:800; color:var(--dark); letter-spacing:-.3px; }
.logo-tagline { font-size:10px; color:var(--muted); font-weight:500; margin-top:-2px; }
.header-actions { display:flex; align-items:center; gap:12px; }

/* ── Layout ── */
.page { padding:28px 0 48px; }
.layout { display:grid; grid-template-columns:260px 1fr; gap:24px; align-items:start; }

/* ── Sidebar ── */
.sidebar { background:var(--card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden; position:sticky; top:80px; }
.sidebar-profile { padding:22px 18px 18px; background:linear-gradient(135deg,#1e3a52,#2a5278); position:relative; overflow:hidden; }
.sidebar-profile::after { content:"✉️"; position:absolute; right:-10px; bottom:-14px; font-size:72px; opacity:.08; pointer-events:none; }
.profile-avatar { width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.3); display:grid; place-items:center; font-size:20px; font-weight:800; color:#fff; margin-bottom:12px; }
.profile-name { font-size:16px; font-weight:700; color:#fff; margin-bottom:3px; }
.profile-sub { font-size:12px; color:rgba(255,255,255,0.6); }
.sidebar-nav { padding:12px 10px; }
.nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:#334155; font-size:14px; font-weight:600; transition:background .12s; margin-bottom:2px; }
.nav-item:hover { background:#f0f4f8; color:var(--dark); }
.nav-item.active { background:#e8f0f8; color:var(--dark); font-weight:700; }
.nav-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.nav-divider { height:1px; background:var(--border); margin:10px 12px; }

/* ── Content ── */
.content { display:flex; flex-direction:column; gap:22px; }
.page-head h1 { font-size:28px; color:var(--dark); font-weight:800; margin-bottom:4px; }
.page-head p { color:var(--muted); font-size:14px; }

/* ── Panel ── */
.panel { background:var(--card); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow); padding:24px; }

.empty-box { background:#f8fbff; border:1px solid var(--border); border-radius:12px; padding:32px; text-align:center; }
.empty-box h3 { color:var(--dark); margin-bottom:8px; }
.empty-box p { color:var(--muted); font-size:14px; }

@media (max-width:980px) { .layout { grid-template-columns:1fr; } .sidebar { position:static; } }
@media (max-width:640px) { .page-head h1 { font-size:22px; } }
</style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <div class="logo-mark">1A</div>
      <div>
        <div class="logo-name">Motor</div>
        <div class="logo-tagline">Motorenmarktplatz</div>
      </div>
    </a>
    <div class="header-actions">
      <!-- auth-header.js befüllt dies -->
    </div>
  </div>
</header>

<main class="page">
  <div class="container layout">

    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="profile-avatar" id="sidebar-avatar">👤</div>
        <div class="profile-name" id="sidebar-name">Wird geladen...</div>
        <div class="profile-sub" id="sidebar-email">–</div>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span>Startseite</a>
        <a href="suche.html" class="nav-item"><span class="nav-icon">🔍</span>Motor suchen</a>
        <div class="nav-divider"></div>
        <a href="meine-anfragen.html" class="nav-item active"><span class="nav-icon">✉️</span>Nachrichten</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <div class="nav-divider"></div>
        <a href="login.html" class="nav-item" id="nav-logout" style="color:#ef4444;"><span class="nav-icon">🚪</span>Abmelden</a>
      </nav>
    </aside>

    <section class="content">
      <div class="page-head">
        <h1>✉️ Nachrichten</h1>
        <p>Hier siehst du deine Anfragen und die Antworten der Verkäufer.</p>
      </div>

      <div class="panel">
        <div id="my-inquiries">
          <div class="empty-box">
            <h3>Nachrichten werden geladen...</h3>
            <p>Bitte einen Moment warten.</p>
          </div>
        </div>
      </div>
    </section>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="my-inquiries.js"></script>
<script src="auth-header.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  // Sidebar User-Info
  const { data } = await supabaseClient.auth.getSession();
  const user = data?.session?.user;

  if (user) {
    const { data: seller } = await supabaseClient
      .from("seller_profiles").select("company_name").eq("user_id", user.id).maybeSingle();

    const displayName = seller?.company_name || user.email || "Mein Konto";
    const initials = displayName.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase() || "?";

    const avatarEl = document.getElementById("sidebar-avatar");
    const nameEl   = document.getElementById("sidebar-name");
    const emailEl  = document.getElementById("sidebar-email");
    if (avatarEl) avatarEl.textContent = initials;
    if (nameEl)   nameEl.textContent   = displayName;
    if (emailEl)  emailEl.textContent  = user.email || "";
  }

  // Logout
  document.getElementById("nav-logout")?.addEventListener("click", async (e) => {
    e.preventDefault();
    await supabaseClient.auth.signOut();
    window.location.href = "index.html";
  });
});
</script>
</body>
</html>
