
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap');

.wrap { display:flex; flex-direction:column; gap:20px; padding:8px 0; }
.card { border-radius:16px; padding:24px 32px; display:flex; align-items:center; gap:18px; }
.lbl { font-family:Arial,sans-serif; font-size:10px; color:#9ca3af; letter-spacing:0.12em; text-transform:uppercase; }

/* Badge base */
.badge { border-radius:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.badge span { font-family:'Inter',sans-serif; font-weight:900; color:#fff; letter-spacing:-0.5px; }

/* V1 – Original nachgebaut, verfeinert */
.v1 { background:#fff; border:1px solid #dbe3ea; }
.v1 .badge { width:58px; height:58px; background: linear-gradient(145deg, #2a6db5, #123a63); box-shadow: 0 6px 20px rgba(18,58,99,0.3); border-radius:16px; }
.v1 .badge span { font-size:22px; }
.v1 .word { font-family:'Inter',sans-serif; font-size:36px; font-weight:800; color:#123a63; letter-spacing:-1px; }

/* V2 – Größer, mehr Tiefe */
.v2 { background:#fff; border:1px solid #dbe3ea; }
.v2 .badge { width:68px; height:68px; background: linear-gradient(145deg, #4a90d9, #123a63); box-shadow: 0 8px 24px rgba(18,58,99,0.35); border-radius:18px; }
.v2 .badge span { font-size:26px; }
.v2 .word { font-family:'Syne',sans-serif; font-size:40px; font-weight:800; color:#123a63; letter-spacing:-1.5px; }

/* V3 – Hellblauer Akzent im Badge */
.v3 { background:#f5f7fa; border:1px solid #dbe3ea; }
.v3 .badge { width:62px; height:62px; background: linear-gradient(135deg, #72b6ff, #1a5ca8); box-shadow: 0 6px 18px rgba(114,182,255,0.4); border-radius:16px; }
.v3 .badge span { font-size:23px; }
.v3 .word { font-family:'Plus Jakarta Sans',sans-serif; font-size:38px; font-weight:800; color:#123a63; letter-spacing:-1px; }

/* V4 – Dunkel, Badge leuchtet */
.v4 { background:#123a63; }
.v4 .badge { width:62px; height:62px; background: linear-gradient(135deg, #72b6ff, #2a7fd4); box-shadow: 0 6px 22px rgba(114,182,255,0.45); border-radius:16px; }
.v4 .badge span { font-size:23px; color:#123a63; }
.v4 .word { font-family:'Inter',sans-serif; font-size:38px; font-weight:800; color:#fff; letter-spacing:-1px; }

/* V5 – Badge mit Subline */
.v5 { background:#fff; border:1px solid #dbe3ea; }
.v5 .badge { width:62px; height:62px; background: linear-gradient(145deg, #3a7fd4, #0d2e52); box-shadow: 0 6px 20px rgba(18,58,99,0.3); border-radius:16px; }
.v5 .badge span { font-size:23px; }
.v5 .textblock { display:flex; flex-direction:column; gap:1px; }
.v5 .word { font-family:'Inter',sans-serif; font-size:36px; font-weight:800; color:#123a63; letter-spacing:-1px; line-height:1; }
.v5 .sub { font-family:'Inter',sans-serif; font-size:11px; font-weight:700; color:#72b6ff; letter-spacing:0.18em; text-transform:uppercase; }

</style>

<div class="wrap">

  <div class="card v1">
    <div class="badge"><span>1A</span></div>
    <div class="word">Motor</div>
  </div>

  <div class="card v2">
    <div class="badge"><span>1A</span></div>
    <div class="word">Motor</div>
  </div>

  <div class="card v3">
    <div class="badge"><span>1A</span></div>
    <div class="word">Motor</div>
  </div>

  <div class="card v4">
    <div class="badge"><span>1A</span></div>
    <div class="word">Motor</div>
  </div>

  <div class="card v5">
    <div class="badge"><span>1A</span></div>
    <div class="textblock">
      <div class="word">Motor</div>
      <div class="sub">Motorenmarktplatz</div>
    </div>
  </div>

</div>
