let importedIds = [];
let statDone = 0, statErr = 0, statSkip = 0;

async function startImport() {
  const email = document.getElementById("email-input").value.trim();
  const pass  = document.getElementById("pass-input").value;
  if (!email || !pass) { alert("Bitte E-Mail und Passwort eingeben!"); return; }

  document.getElementById("progress-card").style.display = "block";
  document.getElementById("btn-start").disabled = true;
  statDone = 0; statErr = 0; statSkip = 0; importedIds = [];
  log("🔐 Einloggen...\n");

  const { data: authData, error: authErr } = await sb.auth.signInWithPassword({ email, password: pass });
  if (authErr) { log("❌ Login fehlgeschlagen: " + authErr.message + "\n"); document.getElementById("btn-start").disabled = false; return; }

  const user = authData.user;
  log("✅ Eingeloggt: " + user.email + "\n");

  const { data: seller } = await sb.from("seller_profiles").select("id,company_name").eq("user_id", user.id).maybeSingle();
  if (!seller) { log("❌ Kein Händlerprofil!\n"); document.getElementById("btn-start").disabled = false; return; }
  log("🏢 Händler: " + seller.company_name + "\n");

  const { data: cats } = await sb.from("categories").select("id,name,slug");
  const catMap = {};
  if (cats) cats.forEach(c => {
    catMap[c.name] = c.id;
    catMap[c.name.toLowerCase()] = c.id;
    catMap[c.slug] = c.id;
  });
  log("📦 " + cats.length + " Kategorien geladen\n\n");

  document.getElementById("stat-total").textContent = INSERATE.length;

  // Batch-Insert in Gruppen von 10 für Geschwindigkeit
  const BATCH = 10;
  for (let i = 0; i < INSERATE.length; i += BATCH) {
    const batch = INSERATE.slice(i, i + BATCH);
    const payloads = [];

    for (const ins of batch) {
      let catId = catMap[ins.category] || catMap[ins.category.toLowerCase()];
      if (!catId) {
        // Fuzzy: erstes Wort suchen
        const firstWord = ins.category.split(" ")[0].toLowerCase();
        const match = cats.find(c => c.name.toLowerCase().includes(firstWord) || c.slug.includes(firstWord));
        catId = match ? match.id : cats[0].id;
      }
      payloads.push({
        seller_id:    seller.id,
        category_id:  catId,
        title:        ins.title,
        manufacturer: ins.manufacturer,
        model:        ins.model,
        condition:    ins.condition || "Gebraucht",
        price:        ins.price,
        year:         ins.year || null,
        location:     ins.location || "Deutschland",
        description:  ins.description,
        status:       "Freigegeben",
        listing_type: ins.listing_type || "Verkauf",
        price_type:   ins.price_type || "Festpreis",
        image_urls:   []
      });
    }

    const { data, error } = await sb.from("listings").insert(payloads).select("id");

    if (error) {
      statErr += batch.length;
      log("❌ Batch [" + (i+1) + "-" + (i+batch.length) + "] FEHLER: " + error.message + "\n");
    } else {
      statDone += data.length;
      data.forEach(d => importedIds.push(d.id));
      log("✅ [" + (i+1) + "-" + (i+batch.length) + "/" + INSERATE.length + "] " + batch[0].title.substring(0,50) + "...\n");
    }

    const pct = Math.round((i + batch.length) / INSERATE.length * 100);
    document.getElementById("stat-done").textContent  = statDone;
    document.getElementById("stat-err").textContent   = statErr;
    document.getElementById("stat-skip").textContent  = statSkip;
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("progress-pct").textContent = pct + "%";

    await new Promise(r => setTimeout(r, 50));
  }

  log("\n🎉 FERTIG! " + statDone + " Inserate eingefügt, " + statErr + " Fehler.\n");
  document.getElementById("btn-start").disabled = false;
  document.getElementById("btn-delete").style.display = "block";
}

async function deleteAll() {
  if (!importedIds.length) { alert("Keine IDs dieser Session gespeichert."); return; }
  if (!confirm("Alle " + importedIds.length + " importierten Inserate löschen?")) return;
  log("\n🗑️ Lösche " + importedIds.length + " Inserate...\n");

  // In Chunks löschen (max 100 per Request)
  for (let i = 0; i < importedIds.length; i += 100) {
    const chunk = importedIds.slice(i, i + 100);
    await sb.from("listings").delete().in("id", chunk);
  }
  log("✅ Gelöscht!\n");
  importedIds = [];
}

function log(msg) {
  const el = document.getElementById("log");
  el.textContent += msg;
  el.scrollTop = el.scrollHeight;
}
